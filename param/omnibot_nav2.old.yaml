###############################################################################
# OmniBot Navigation2 Configuration
# Designed for Mecanum-drive omnidirectional robot
###############################################################################

amcl:
  ros__parameters:
    use_sim_time: False
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "/scan"
    robot_model_type: "nav2_amcl::OmniMotionModel"
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    max_particles: 2000
    min_particles: 500
    z_hit: 0.9
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 3.0
    max_beams: 60
    alpha1: 0.01
    alpha2: 0.01
    alpha3: 0.01
    alpha4: 0.01
    alpha5: 0.01
    do_beamskip: false
    pf_err: 0.05
    pf_z: 0.99
    save_pose_rate: 0.5
    set_initial_pose: true

###############################################################################
# Behavior Tree Navigator
###############################################################################

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: "/odom"
    default_server_timeout: 20
    bt_loop_duration: 10
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_recovery_node_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_pipeline_sequence_bt_node

###############################################################################
# Controller Server (MPPI Controller for Mecanum)
###############################################################################

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 30.0
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 40
      model_dt: 0.05
      batch_size: 1000
      vx_std: 0.1
      vy_std: 0.1
      wz_std: 0.3
      vx_max: 0.4
      vx_min: -0.4
      vy_max: 0.4
      vy_min: -0.4
      wz_max: 2.0
      iteration_count: 1
      prune_distance: 1.0
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"
      visualize: false
      critics: ["GoalCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "CostCritic"]
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
      PathAlignCritic:
        enabled: true
        cost_weight: 10.0
        threshold_to_consider: 0.5
      PathFollowCritic:
        enabled: true
        cost_weight: 5.0
      PathAngleCritic:
        enabled: true
        cost_weight: 2.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.5

###############################################################################
# Planner Server (Global Path Planner)
###############################################################################

planner_server:
  ros__parameters:
    use_sim_time: False
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_theta_star_planner/ThetaStarPlanner"
      how_many_corners: 8
      w_euc_cost: 1.0
      w_traversal_cost: 2.0
      w_heuristic_cost: 1.0
      allow_unknown: true
      use_final_approach_orientation: true

###############################################################################
# Costmaps
###############################################################################

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: '[[-0.15, -0.15], [-0.15, 0.15], [0.15, 0.15], [0.15, -0.15]]'
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: True
          marking: True
          max_obstacle_height: 1.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.4
        cost_scaling_factor: 5.0
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /map
        subscribe_to_updates: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: True
          marking: True
          max_obstacle_height: 1.0
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.5
        cost_scaling_factor: 3.0
      always_send_full_costmap: True

###############################################################################
# Map Server & Saver
###############################################################################

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65

###############################################################################
# Smoother & Recovery Behaviors
###############################################################################

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: False
    cycle_frequency: 20.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    max_rotational_vel: 2.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0

###############################################################################
# Optional Utilities (smoothing, safety)
###############################################################################

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    feedback: "OPEN_LOOP"
    scale_velocities: False
    max_velocity: [0.4, 0.4, 1.0]
    min_velocity: [-0.4, -0.4, -1.0]
    max_accel: [0.6, 0.6, 1.0]
    max_decel: [-0.6, -0.6, -1.0]
    odom_topic: "/odom"
    velocity_timeout: 1.0